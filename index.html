<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junior's Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:#0b0f14;color:#fff;}

/ NAV /
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:15px 25px;
background:rgba(0,0,0,.7);
z-index:10;
}
nav h2{color:#ffb300;}

/ HERO /
.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

/ SLIDESHOW /
.slideshow{
position:absolute;
top:0;left:0;width:100%;height:100%;
}
.slide{
position:absolute;
width:100%;height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s ease;
}
.slide.active{opacity:1;}

/ DARK OVERLAY /
.hero::after{
content:"";
position:absolute;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.5);
}

/ CONTENT /
.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero h1{
font-size:48px;
font-weight:900;
}

.hero span{color:#ffb300;}

.btn{
display:inline-block;
margin:12px;
padding:14px 26px;
border-radius:10px;
text-decoration:none;
font-weight:700;
}

.btn-main{background:#ffb300;color:#000;}
.btn-outline{border:1px solid #fff;color:#fff;}

/ SECTION /
.section{
padding:80px 20px;
text-align:center;
}

/ SERVICES /
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
max-width:1000px;
margin:auto;
}
.card{
background:#121821;
padding:25px;
border-radius:10px;
}

/ GALLERY /
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
max-width:1100px;
margin:auto;
}
.grid img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

/ CONTACT /
.contact{
background:#121821;
padding:60px 20px;
}

/ STICKY */
.sticky{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:10px;
}
</style>
</head>

<body>

<nav>
<h2>Junior's Services</h2>
</nav>

<!-- HERO -->
<section class="hero">

<div class="slideshow">
<img src="IMG_0613.jpeg" class="slide active">
<img src="IMG_0621.jpeg" class="slide">
<img src="IMG_0624.jpeg" class="slide">
<img src="IMG_0558.jpeg" class="slide">
</div>

<div class="hero-content">
<h1><span>Premium</span> Tree Work & Construction</h1>
<p>Nashville & Surrounding Areas</p>

<a href="tel:6159987338" class="btn btn-main">Call Now</a>
<a href="sms:6159987338" class="btn btn-outline">Text Us</a>
</div>

</section>

<!-- SERVICES -->
<section class="section">
<h2>Our Services</h2>

<div class="services">
<div class="card">Tree Removal</div>
<div class="card">Land Clearing</div>
<div class="card">Mulching</div>
<div class="card">Construction</div>
<div class="card">Yard Cleanup</div>
<div class="card">Furniture Moving</div>
</div>
</section>

<!-- WORK -->
<section class="section">
<h2>Our Work</h2>

<div class="grid">
<img src="IMG_0199.jpeg">
<img src="IMG_0486.jpeg">
<img src="IMG_0521.jpeg">
<img src="IMG_0522.jpeg">
<img src="IMG_0558.jpeg">
<img src="IMG_0612.jpeg">
<img src="IMG_0613.jpeg">
<img src="IMG_0621.jpeg">
<img src="IMG_0624.jpeg">
<img src="IMG_5710.jpeg">
<img src="IMG_5711.jpeg">
<img src="IMG_5712.jpeg">
<img src="IMG_5715.jpeg">
<img src="IMG_5720.jpeg">
</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Call or Text Anytime</h2>
<h1>(615) 998-7338</h1>
<p>Nashville • Antioch • Brentwood • Franklin</p>
</section>

<!-- STICKY -->
<div class="sticky">
<a href="tel:6159987338" class="btn btn-main">Call</a>
<a href="sms:6159987338" class="btn btn-outline">Text</a>
</div>

<script>
let slides = document.querySelectorAll('.slide');
let i = 0;

setInterval(()=>{
slides[i].classList.remove('active');
i = (i + 1) % slides.length;
slides[i].classList.add('active');
},2500);
</script>

</body>
</html>
