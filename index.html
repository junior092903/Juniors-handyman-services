<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junior's Landscaping & Handyman Services</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial;
background:#0a0d12;
color:white;
}

/* NAV */
nav{
position:fixed;
width:100%;
top:0;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 18px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(12px);
z-index:999;
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:45px;
width:auto;
border-radius:6px;
}

/* MOBILE FIX */
@media (max-width:600px){
.logo img{
height:32px;
}
}

nav a{
color:white;
text-decoration:none;
margin-left:15px;
font-size:14px;
}

/* HERO SLIDER */
.hero{
margin-top:60px;
height:75vh;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

/* HERO TEXT */
.hero-content{
position:absolute;
bottom:40px;
left:20px;
z-index:2;
}

.hero h1{
font-size:32px;
}

.btn{
padding:12px 20px;
background:#ffb300;
color:black;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:10px;
font-weight:bold;
}

/* SECTION */
.section{
padding:60px 20px;
}

/* SERVICES */
.services{
display:grid;
gap:15px;
}
.card{
background:#111;
padding:20px;
border-radius:10px;
}

/* GALLERY */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}
.grid img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

/* CONTACT */
iframe{
width:100%;
height:250px;
border:none;
border-radius:10px;
}

/* STICKY */
.sticky{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:10px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">
<img src="CE76556F-8246-4B0E-BBD8-317366D74460.png">
</div>

<div>
<a href="#services">Services</a>
<a href="#work">Work</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO SLIDES -->
<section class="hero">
<div class="slide active" style="background-image:url('IMG_0613.jpeg')"></div>
<div class="slide" style="background-image:url('IMG_0612.jpeg')"></div>
<div class="slide" style="background-image:url('IMG_0621.jpeg')"></div>

<div class="hero-content">
<h1>Premium Landscaping & Handyman</h1>
<p>Nashville & Surrounding Areas</p>

<a href="tel:6159987338" class="btn">Call Now</a>
<a href="sms:6159987338" class="btn">Text Us</a>
</div>
</section>

<!-- SERVICES -->
<section class="section" id="services">
<h2>Our Services</h2>

<div class="services">
<div class="card">Tree Removal</div>
<div class="card">Land Clearing</div>
<div class="card">Mulching</div>
<div class="card">Construction</div>
<div class="card">Yard Cleanup</div>
<div class="card">Furniture Moving</div>
</div>
</section>

<!-- WORK -->
<section class="section" id="work">
<h2>Our Work</h2>

<div class="grid">
<img src="IMG_0199.jpeg">
<img src="IMG_0486.jpeg">
<img src="IMG_0521.jpeg">
<img src="IMG_0522.jpeg">
<img src="IMG_0558.jpeg">
<img src="IMG_0624.jpeg">
<img src="IMG_5710.jpeg">
<img src="IMG_5711.jpeg">
<img src="IMG_5712.jpeg">
<img src="IMG_5715.jpeg">
<img src="IMG_5720.jpeg">
</div>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
<h2>Service Area</h2>
<p>Nashville • Antioch • Brentwood • Franklin</p>

<iframe src="https://maps.google.com/maps?q=Nashville%20TN&t=&z=10&ie=UTF8&iwloc=&output=embed"></iframe>

<h2>(615) 998-7338</h2>
</section>

<!-- STICKY -->
<div class="sticky">
<a href="tel:6159987338" class="btn">Call</a>
<a href="sms:6159987338" class="btn">Text</a>
</div>

<!-- SLIDER SCRIPT -->
<script>
let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
</script>

</body>
</html>
