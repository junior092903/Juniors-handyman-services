<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junior's Landscaping & Handyman</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#0b0f14;color:white;}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 2s forwards;
animation-delay:2s;
}
#intro img{height:80px;}
@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
background:#000;
padding:10px;
z-index:999;
}
nav img{height:35px;}

/* HERO */
.hero{
margin-top:60px;
height:70vh;
position:relative;
}
.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
}
.slide.active{opacity:1;}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* BUTTON */
.btn{
padding:12px 20px;
background:#ffb300;
color:black;
border-radius:8px;
text-decoration:none;
margin:10px;
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}
.grid img{
width:100%;
height:150px;
object-fit:cover;
}

/* BEFORE AFTER */
.compare{
position:relative;
max-width:300px;
margin:auto;
}
.compare img{
width:100%;
}
.slider{
position:absolute;
top:0;
left:50%;
width:3px;
height:100%;
background:#ffb300;
}

/* FORM */
input,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
}

/* STICKY */
.sticky{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:10px;
}
</style>
</head>
<body>
<!-- INTRO -->
<div id="intro">
<img src="CE76556F-8246-4B0E-BBD8-317366D74460.png">
</div>
<!-- NAV -->
<nav>
<img src="CE76556F-8246-4B0E-BBD8-317366D74460.png">
</nav>
<!-- HERO -->
<section class="hero">
<div class="slide active" style="background-image:url('IMG_0613.jpeg')"></div>
<div class="slide" style="background-image:url('IMG_0621.jpeg')"></div>
<div class="overlay">
<h2>Premium Landscaping</h2>
<a href="tel:6159987338" class="btn">Call</a>
<a href="sms:6159987338" class="btn">Text</a>
</div>
</section>
<!-- BEFORE AFTER -->
<section class="section">
<h2>Before / After</h2>
<div class="compare">
<img src="IMG_0612.jpeg">
<img src="IMG_0621.jpeg" style="position:absolute;top:0;left:0;width:50%;">
<div class="slider"></div>
</div>
</section>
<!-- QUOTE -->
<section class="section">
<h2>Quick Estimate</h2>
<select id="service">
<option value="100">Small Job ($100)</option>
<option value="300">Medium Job ($300)</option>
<option value="600">Large Job ($600)</option>
</select>
<h3 id="price"></h3>
</section>
<!-- BOOK -->
<section class="section">
<h2>Book a Job</h2>
<input type="text" id="name" placeholder="Name">
<input type="text" id="job" placeholder="Job details">
<button class="btn" onclick="send()">Send Request</button>
</section>
<!-- WORK -->
<section class="section">
<h2>Our Work</h2>
<div class="grid">
<img src="IMG_0199.jpeg">
<img src="IMG_0486.jpeg">
<img src="IMG_0521.jpeg">
<img src="IMG_0522.jpeg">
<img src="IMG_0558.jpeg">
<img src="IMG_0624.jpeg">
<img src="IMG_5710.jpeg">
<img src="IMG_5711.jpeg">
<img src="IMG_5712.jpeg">
<img src="IMG_5715.jpeg">
<img src="IMG_5720.jpeg">
</div>
</section>
<!-- CONTACT -->
<section class="section">
<h2>Call Now</h2>
<h1>(615) 998-7338</h1>
</section>
<!-- STICKY -->
<div class="sticky">
<a href="tel:6159987338" class="btn">Call</a>
<a href="sms:6159987338" class="btn">Text</a>
</div>
<script>
let slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},3000);

function calc(){
let val=document.getElementById('service').value;
document.getElementById('price').innerText="Estimated: $"+val;
}

function send(){
let name=document.getElementById("name").value;
let job=document.getElementById("job").value;
window.location.href=`sms:6159987338?body=New job from ${name}: ${job}`;
}
</script>
</body>
</html>
:::
